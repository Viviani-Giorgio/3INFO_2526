<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Galleria Fotografica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <table class="gallery-table">
        <tr>
            <td>
                <div class="container">
                    <img src="arch-linux.jpg" alt="Immagine 1">
                    <div class="caption">arch-linux</div>
                </div>
            </td>
            <td>
                <div class="container">
                    <img src="gorilla-suca.jpg" alt="Immagine 2">

                </div>
            </td>
            <td>
                <div class="container">
                    <img src="linux-mint.jpg" alt="Immagine 3">

            </td>
            <td>
                <div class="container">
                    <img src="paperella.jpg" alt="Immagine 4">
                    <div class="caption">paperella</div>
                </div>
            </td>
        </tr>
    </table>

</body>
</html>
