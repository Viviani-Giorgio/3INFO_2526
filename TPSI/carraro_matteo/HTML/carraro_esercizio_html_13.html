<!DOCTYPE html>
<html lang="it">
    <head>
        <title>esercizio 13</title>
    </head>
    <body>
        <h1>Informazioni dell'utente</h1>
        <p>Compila il documento con le tue informazioni personali</p>
        <form>
            <label for="idboth">Nome</label>
            <input type="text" id="idboth" name="both" placeholder="Nome e cognome" size="50"><br>
            <h3>Genere</h3><br>
            <input type="radio" id="studente" name="genere" value="maschio">
            <label for="maschio">Maschio</label><br>
            <input type="radio" id="studente" name="genere" value="femmina">
            <label for="femmina">Femmina</label><br>
            <h3>Sei uno studente lavoratore?</h3><br>
            <input type="checkbox" id="no" name="professione" value="no">
            <label for="no">no</label><br>
            <input type="checkbox" id="si" name="professione" value="si">
            <label for="studente">si</label>

            <select name="scuola" id="school">

                <option value="Università degli Studi di Roma Foro Italico">Università degli Studi di Roma Foro Italico</option>
                <option value="La Sapienza Università di Roma">La Sapienza Università di Roma</option>
                <option value="Università degli Studi di Roma Tor Vergata">Università degli Studi di Roma Tor Vergata</option>
            </select><br>
            <h3>Lavoro</h3>
            <label for="bio">Lavoro svolto:</label><br>
            <textarea id="bio" name="bio" placeholder="Parla del tuo lavoro" size="80"></textarea><br>
            <input type="submit">
            <input type="reset">
        </form>
    </body>
