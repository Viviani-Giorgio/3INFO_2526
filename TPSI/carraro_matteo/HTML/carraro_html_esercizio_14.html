<!DOCTYPE html>


<html>


    <head>


        <title>esercizio 14</title>


    </head>


    <body style="text-align: center;">


        <h1>Informazioni studente</h1>


        <p>Compila il documento con le tue informazioni personali</p>


        <form>


            <label for="idnome">Nome</label>


            <input type="text" id="idnome" name="nome" placeholder="Nome"><br>


            <label for="idcognome">Cognome</label>


            <input type="text" id="idcognome" name="cognome" placeholder="Cognome">


            <h3>Genere</h3><br>


            <input type="radio" id="studente" name="genere" value="maschio">


            <label for="maschio">Maschio</label><br>


            <input type="radio" id="studente" name="genere" value="femmina">


            <label for="femmina">Femmina</label><br>


            <input type="radio" id="studente" name="genere" value="altro">


            <label for="altro">Altro</label><br>


            <input type="radio" id="studente" name="genere" value="non">


            <label for="non">Preferisco non specificarlo</label><br>


            <h3>Data di nascita</h3><br>


            <input type="date">

<hr><hr>
            <h3>Sport</h3><br>


            <label for="calcio">Calcio</label>


            <input type="checkbox" id="calcio" name="sport" value="calcio"><br>


            <label for="basket">Basket</label>


            <input type="checkbox" id="basket" name="sport" value="basket"><br>


            <label for="nuoto">Nuoto</label>


            <input type="checkbox" id="nuoto" name="sport" value="nuoto"><br>


            <label for="calcio">Pallavolo</label>


            <input type="checkbox" id="pallavolo" name="sport" value="pallavolo"><br>


            <label for="calcio">Atletica</label>


            <input type="checkbox" id="atletica" name="sport" value="atletica"><br><br>

<hr><hr>
            <label for="idbutton">Usa </label>


            <a href="https://lausinformatica.com/wp-content/uploads/2021/10/Linux-1024x576.jpg"><input type="button" id="idbutton" value="Linux"></a>
<hr><hr>
            <label for="veloce">Velocità:</label>

            <input type="range" min="20" max="100" id="veloce" value="60">

            <label for="Forza">Forza:</label>

            <input type="range" min="0%" max="100%" id="Forza">
            
            <label for="Intelligenza">Intelligenza:</label>

            <input type="range" min="20" max="100" id="Intelligenza"> <br><br>

            <label for="altezza">Altezza</label>
            <input type="number" id="altezza" min="140" max="200" name="altezza"> <br><br>
            
            <label for="peso">Peso</label>
            <input type="number" id="peso" min="30" max="100" name="peso"> <br><br>

            <label for="nump">Numero preferito</label>
            <input type="number" id="nump" min="0" max="10000" name="nump"> <br><br>

            <label for="IQ">IQ</label>
            <input type="number" id="IQ" min="70" max="160" name="IQ"> <br><br>

            <label for="color">Colore preferito</label>
            <input type="color" id="color" value="#ff0011"><br><br>

            <label for="nazione">Nazionalità</label><br>
            <input list="nazione2" id="nazione" name="nazione">
            <datalist id="nazione2">
                <option value="Albanese">
                <option value="Italiano">
                <option value="Inglese">
                <option value="Americano">
                <option value="Francese">
            </datalist><br><br><br>

            <label for="religione">Religione:</label>
            <select name="religione" id="regione">
                <option value="Cristiano">Cristiano</option>
                <option value="Musulmano">Musulmano</option>
                <option value="Ebreo">Ebreo</option>
                <option value="Buddista">Buddista</option>
            </select><br><br><br>
<hr><hr>
            <label for="bio">Biografia:</label>
            <textarea for="bio" rows="6" cols="60"></textarea>
        </form>


    </body>


</html>
