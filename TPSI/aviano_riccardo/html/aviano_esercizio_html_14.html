<!DOCTYPE html>
<html lang="it">
    <head>
        <style>
            body {background-color: rgb(255, 255, 255);}
        </style>
        <title>
            Pagina FORM HTML
        </title>
    </head>
    <body>
        <h1>Iscrizione centro sportivo</h1>
        <br><h2>Dati personali</h2>

    
        <form>
            <label for="idnome">Nome: </label>
            <input type="text" id="idnome" name="dati personali" placeholder="">
            <label for="idcognome">Cognome: </label>
            <input type="text" id="idcognome" name="dati personali" placeholder="">
            <label for="iddata">Data di nascita: </label>
            <input type="date" id="iddata" name="dati personali"><br>
            <label for="altezza">Altezza</label>
            <input type="number" id="altezza" name="dati personali" min="150" max="200">
            <label for="altezza">cm</label><br>
            <label for="peso">Peso</label>
            <input type="number" id="peso" name="dati personali" min="0" max="300">
            <label for="peso">kg</label><br>
            <label for="spalle">Larghezza spalle</label>
            <input type="number" id="spalle" name="dati personali" min="0" max="70">
            <label for="spalle">cm</label><br>
            <label for="bicipiti">Circonferenza bicipiti</label>
            <input type="number" id="bicipiti" name="dati personali" min="0" max="70">
            <label for="bicipiti">cm</label><br>
            <label for="femorali">Circonferenza femorali</label>
            <input type="number" id="femorali" name="dati personali" min="0" max="100">
            <label for="femorali">cm</label><br>
            <label for="city">Città di appartenenza: </label><br>
            <input list="city" name="city" id="city">
            <datalist id="city">
                <option value="Torino">
                <option value="Moncalieri">
                <option value="Nichelino">
                <option value="Cambiano">
                <option value="Asti">
            </datalist>
            <h3>Colore preferito</h3>
            <input type="color" id="favcolor" name="favcolor" value="#ff0000"><br><br>
            <h2>Pratica</h2>
            <input type="checkbox" id="calcio" name="pratica" value="calcio">
            <label for="calcio">Calcio</label><br>
            <input type="checkbox" id="basket" name="pratica" value="basket">
            <label for="basket">Basket</label><br>
            <input type="checkbox" id="nuoto" name="pratica" value="nuoto">
            <label for="nuoto">Nuoto</label><br>
            <input type="checkbox" id="tennis" name="pratica" value="tennis">
            <label for="tennis">Tennis</label><br><br>
            <h2>Sesso</h2>
            <input type="radio" id="maschio" name="sesso" value="maschio">
            <label for="maschio">Maschio</label><br>
            <input type="radio" id="femmina" name="sesso" value="femmina">
            <label for="tennis">Femmina</label><br>
            <label for="altro">Altro:  </label>
            <select name="sesso" id="altro">
                <option value="trans">Transgender</option>
                <option value="queer">Queer</option>
                <option value="intersessuale">Intersessuale</option>
                <option value="pansessuale">Pansessuale</option>
                <option value="fluido">Fluido</option>
            </select>
            <h3>Pagamento</h3>
            <label for="rate">Pagamento quota prima rata: </label>
            <input type="range" min="30" max="100" value="60" class="slider" id="rate"><br>
            <label for="rate">Pagamento quota seconda rata: </label>
            <input type="range" min="30" max="100" value="60" class="slider" id="rate"><br> 
            <label for="rate">Pagamento quota terza rata: </label>
            <input type="range" min="30" max="100" value="60" class="slider" id="rate"><br>  
            <label for="note"><b>Note</b></label>
            <textarea id="note" name="note" rows="6" cols="60" placeholder="--Note--"></textarea>
            <label for="idbutton"></label><br>
            <input type="button" id="idbutton" value="Invia form">
        </form>
