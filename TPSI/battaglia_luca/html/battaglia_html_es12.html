<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Form di Dati</title>
</head>
<body>
    <form>
        <p>
            <label for="idnome">Nome: </label>
            <input type="text" id="idnome" name="nome" placeholder="Nome">
            
            <label for="idcognome">Cognome: </label>
            <input type="text" id="idcognome" name="idcognome" placeholder="Cognome">
        </p>

        <p>
            <label for="idbutton">Premilo!: </label>
            <input type="button" id="idbutton" value="Premilo!!">
        </p>

        <h3>Occupazione:</h3>
        <input type="radio" id="studente" name="occupazione" value="studente">
        <label for="studente">C. Ronaldo</label><br>
        
        <input type="radio" id="occupato" name="occupazione" value="occupato">
        <label for="occupato">L. Messi</label><br>
        

        <input type="radio" id="jdavid" name="occupazione" value="disoccupato">
        <label for="jdavid">J. David</label>

        <h3>Sport</h3>
        <input type="checkbox" id="tennis" name="sport" value="tennis">
        <label for="tennis">Tennis</label><br>
        
        <input type="checkbox" id="calcio" name="sport" value="calcio">
        <label for="calcio">Calcio</label><br>
        
        <input type="checkbox" id="nuoto" name="sport" value="nuoto">
        <label for="nuoto">Nuoto</label><br>
        
        <input type="checkbox" id="palestra" name="sport" value="palestra">
        <label for="palestra">Palestra</label><br>
        
        <input type="checkbox" id="cricket" name="sport" value="cricket">
        <label for="cricket">Cricket</label>

        <h3>Data di Nascita</h3>
        <label for="iddata">Data: </label>
        <input type="date" id="iddata" name="birthday">
    </form>
</body>
</html>
