<!DOCTYPE html>


<html>
    <head>
        <title>esercizio 12</title>
    </head>
    <body>
        <h1>info studenti</h1>
        <p>inserisci i tuoi dati personali</p>
        <form>

            <label for="idnome">Nome: </label>
            <input type="text" id="idnome" name="nome" placeholder="Nome">
            <label for="idcognome">Cognome: </label>
            <input type="text" id="idcognome" name="cognnome" placeholder="Cognome">

            <h3>classe:</h3><br>

            <input type="radio" id="studente" name="occupazione" value="studente">
            <label for="studente">Prima</label><br>
            <input type="radio" id="occupato" name="occupazione" value="occupato">
            <label for="occupato">Seconda</label><br>
            <input type="radio" id="disoccupato" name="occupazione" value="disoccupato">
            <label for="disoccupato"> Terza</label><br><br>

            <h3>sport</h3>

            <input type="checkbox" id="tennis" name="sport" value="tennis"> 
            <label for="tennis">  Tennis</label><br>
            <input type="checkbox" id="calcio" name="sport" value="calcio">
            <label for="calcio">  Calcio</label><br>
            <input type="checkbox" id="basket" name="sport" value="basket">
            <label for="basket">  Basket</label><br>
            <input type="checkbox" id="pallavolo" name="sport" value="pallavolo">
            <label for="pallavolo"> Pallavolo</label><br>

            <h3>Data di Nascita</h3>

            <input type="date" id="iddata" name="birthday"><br><br>

            <label for="peso">Peso: </label>
            <input type="range" min="50" max="100" class="slider" id="peso"><br> 
            <label for="altezza">altezza: </label>
            <input type="range" min="150" max="210" class="slider" id="altezza"><br> 
            <label for="velocita">velocita: </label>
            <input type="range" min="50" max="100" class="slider" id="velocita"><br> 

            <h3>Altezza</h3><br>

            <input type="number" id="altezza" name="altezza" min="150" max="200"><br><br>

            <h3>peso</h3><br>

            <input type="number" id="peso" name="peso" min="40" max="200"><br><br>

            <h3>IQ</h3><br>

            <input type="number" id="IQ" name="IQ" min="50" max="200"><br><br>

            <h3>numero preferito</h3><br>

            <input type="number" id="velocita" name="velocita" min="150" max="200"><br><br>

            <h3>Colore preferito</h3><br>

            <input type="color" id="favcolor" name="favcolor" value="#ff0000"><br><br>

            <label for="cars">religione:  </label>
            <select name="religione" id="cars">
            <option value="cristiano">cristiano</option>
            <option value="mussulmano">mussulmano</option>
            <option value="islamico">islamico</option>
            <option value="ebreo">ebreo</option>
            </select><br><br>

            <label for="nazioni">Nazionalità: </label><br>
            <input list="nations" name="nazioni" id="nazioni">
            <datalist id="nations">
                <option value="italiana">
                <option value="francese">
                <option value="Inglese">
                <option value="Irlandese">
                <option value="brasiliana">
            </datalist><br><br>

            <label for="idbutton">Premi il pulsante per consegnare: </label>
            <input type="button" id="idbutton" value="Consegna">

                <label for="bio">Biografia:</label>
                <textarea id="bio" name="bio" rows="6" cols="60" placeholder="Inserisci la tua biografia"></textarea>    

        </form>
    </body>
</html>
