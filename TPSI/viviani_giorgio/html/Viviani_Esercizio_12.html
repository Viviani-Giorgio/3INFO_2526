 <form>
<input type="text" id="idnome" name="nome" placeholder="Nome">

 </form> 
 <form>
<label for="idbutton">Premi il pulsante</label>

</form>
<h3>OS:</h3><br>
<form>
  <input type="radio" id="OS1" name="Operative sistem" value="Linux">
  <label for="OS1">  Linux</label><br>  
  <input type="radio" id="OS2" name="Operative sistem" value="Windows">
  <label for="OS2">  Windows</label><br>
  <input type="radio" id="OS3" name="Operative sistem" value="MAC">
  <label for="OS3"> MAC</label><br><br>
</form>

<h3>RAM:</h3><br>
<form>
  <input type="checkbox" id="DDR1" name="memory" value="DDR1">
  <label for="DDR1">  DDR1</label><br>
  <input type="checkbox" id="DDR2" name="memory" value="DDR2">
  <label for="DDR2">  DDR2</label><br>
  <input type="checkbox" id="DDR3" name="memory" value="DDR3">
  <label for="DDR3"> DDR3</label><br>
  <input type="checkbox" id="DDR4" name="memory" value="DDR4">
  <label for="DDR4">  DDR4</label><br>
  <input type="checkbox" id="DDR5" name="memory" value="DDR5">
  <label for="DDR5">  DDR5</label><br>
</form>
<h3>Quando hai comprato la tua RAM</h3><br>
<form>
  <input type="date" id="iddata" name="RAM"><br><br>
