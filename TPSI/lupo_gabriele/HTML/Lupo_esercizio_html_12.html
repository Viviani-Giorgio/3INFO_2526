<!DOCTYPE html>
<html>
    <head>
        <title>Esercizio_HTML_12</title>
    </head>
    <body>        
        <form>
            <p>Inserisci il tuo nome e cognome: </p>
                <table>
                    <tr>
                        <td><label for="idnome">Nome: </label></td>
                        <td><input type="text" id="idnome" name="nome" placeholder="Nome"></td>
                    </tr>
                    <tr>
                        <td><label for="idcognome">Cognome: </label></td> 
                        <td><input type="text" id="idcognome" name="cognome" placeholder="Cognome"></td>        
                    </tr>                 
                </table>
            <p>Inserisci la tua classe: </p>         
                <input type="radio" id="1°" name="classe" value="1°">
                <label for="1°">1°</label>
                <input type="radio" id="2°" name="classe" value="2°">
                <label for="2°">2°</label>
                <input type="radio" id="3°" name="classe" value="3°">
                <label for="3°">3°</label>
                <input type="radio" id="4°" name="classe" value="4°">
                <label for="4°">4°</label>
                <input type="radio" id="5°" name="classe" value="5°">
                <label for="5°">5°</label>        
            <p>Inserisci il/i corso/corsi che frequenti: </p>        
                <input type="checkbox" id="Teatro" name="corso" value="Teatro">
                <label for="Teatro">Teatro</label> <br>
                <input type="checkbox" id="MGS" name="MGS" value="MGS">
                <label for="MGS">MGS</label> <br>
                <input type="checkbox" id="First Course" name="corso" value="First Course">
                <label for="First Course">First Course</label> <br>
                <input type="checkbox" id="Lettura" name="corso" value="Lettura">
                <label for="Lettura">Lettura</label> <br>
                <input type="checkbox" id="Dibattito" name="corso" value="Dibattito">
                <label for="Dibattito">Dibattito</label> <br> <br>
                <label for="Data">Data di nascita: </label>
                <input type="date" id="Data" name="nascita" value="Data"> <br> <br>
                <label for="Pulsante">Premi il pulsante:</label>
                <input type="button" id="Pulsante" value="Cliccami">                
        </form>
    </body>
</html>
