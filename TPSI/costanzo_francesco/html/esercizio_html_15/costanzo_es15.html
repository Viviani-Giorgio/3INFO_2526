<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esercizio 15</title>
</head>
<body>
    <p>
        <form>
            <labbel for="cognome">Cognome</labbel>
            <input type="text" name="Cognome" id="cognome" size="40" placeholder="Rossi">
            <br>
            <labbel for="nome">Nome</labbel>
            <input type="text" name="nome" id="nome" size="30" placeholder="Mario">
            <br>
            <labbel for="matricola">Matricola</labbel>
            <input type="text" name="matricola" id="matricola" size="12">
            <br>
            <label for="regioni">Regione di residenza</label>
            <select name="regione" id="regioni">
                <option value="Piemonte">Piemonte</option>
                <option value=" Valle d'Aosta"> Valle d'Aosta</option>
                <option value="Liguria">Liguria</option>
                <option value="Lombardia">Lombardia</option>
                <option value="Trentino-Alto Adige">Trentino-Alto Adige</option>
                <option value="Veneto">Veneto</option>
                <option value="Friuli-Venezia Giulia">Friuli-Venezia Giulia</option>
                <option value="Emilia-Romagna">Emilia-Romagna</option>
                <option value="Toscana">Toscana</option>
                <option value="Umbria">Umbria</option>
                <option value="Marche">Marche</option>
                <option value="Lazio">Lazio</option>
                <option value="Abruzzo">Abruzzo</option>
                <option value="Molise">Molise</option>
                <option value="Campania">Campania</option>
                <option value="Puglia">Puglia</option>
                <option value="Basilicata">Basilicata</option>
                <option value="Calabria">Calabria</option>
                <option value="Sicilia">Sicilia</option>
                <option value="Sardegna">Sardegna</option>
            </select>
            <br>
            <labbel for="email">Email</labbel>
            <input type="email" name="email" id="email" size="30" placeholder="email@indirizzo.com" >

            <labbel for="numero">Numero di telefono</labbel>
            <input type="text" name="numero" id="email" size="15" maxlength="15" placeholder="324 234 1353">
            <br>
            <label for="richieste">Richieste particolari:</label>
            <textarea id="richieste" name="richieste" rows="12" cols="60" placeholder="Richieste particolari"></textarea>
            <br>
            <input type="submit" value="Invio">
            <input type="reset" value="Reset">
        </form>
    </p>  
</body>
</html>
