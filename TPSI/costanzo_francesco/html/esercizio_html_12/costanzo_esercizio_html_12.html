<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sondaggio Videogames</title>
</head>
<body>

    <h1>Sondaggio Sui VideoGames</h1>
    
    <p>Come ti chiami? E quanti anni hai?<br>
        <form>
            <label for="idNome">Nome:</label>
            <input type="text" id="idNome" name="nome" placeholder="nome">
            <br>
            <label for="idData">Data di nascita</label>
            <input type="date" id="idData" name="data">

            <br>
            <hr>

            Hai mai giocato ad un videogame?

            <br>
            <label for="provaSi">Si</label>
            <input type="radio" id="provaSi" name="prova" value="Si">
            <br>
            <label for="provaNo">No</label>
            <input type="radio" id="provaSi" name="prova" value="No">
            <br>
            <label for="noRisposta">Preferisco non rispondere</label>
            <input type="radio" id="noRisposta" name="prova" value="Nessuna Risposta">
            <br>
            <hr>
            
            Quali di questi videogames ti sono piaciuti?
            <br>

            <label type="Eldenring">Eldenring</label>
            <input type="checkbox" id="Eldenring" name="videogames" value="Eldenring"> 
            <br>
            <label type="Sekiro">Sekiro</label>
            <input type="checkbox" id="Sekiro" name="videogames" value="Sekiro">
            <br>
            <label type="Fortnite">Fortnite</label>
            <input type="checkbox" id="Fortnite" name="videogames" value="Fortnite">
            <br>
            <label type="League Of Legends">League Of Legends</label>
            <input type="checkbox" id="League Of Legends" name="videogames" value="League Of Legends">
            <br>
            <label type="Hollow Knight">Hollow Knight</label>
            <input type="checkbox" id="Hollow Knight" name="videogames" value="Hollow Knight">
            <hr>

            Per saperne di più su questo mondo clicca qua sotto!
            <br>

            <label for="Clicca">Mondo Videogames:</label>
            <input type="button" id="Clicca" value="Clicca">

        </form>
</p>
    
</body>
</html>
